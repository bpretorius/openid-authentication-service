
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Authenticator</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <style>
        .logo { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="content">
    <div class="logo">
        <img th:src="@{/images/ikea.svg}" alt="Corporate Logo" width="150"/>
    </div>

    <form class="login-form" method="post" th:action="@{/authenticator}">
        <h2>Multi-Factor Authenticator</h2>

        <input id="code" type="text" name="code" placeholder="Code" required autofocus><br><br>

        <div th:if="${param.error}">Invalid code. Please try again.</div>

        <button type="submit" class="primary">Sign in</button>
    </form>
</div>
</body>
</html>
